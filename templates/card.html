<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네온 아카이브 - 역사 통합 카드</title>
    <!-- Pretendard & Inter 폰트 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --card-size: 1080px;
            --padding: 80px;
            --bg-color: #0d0d0d;
            --neon-yellow: #d4ff00;
            --text-main: #FFFFFF;
            --text-sub: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Pretendard Variable", "Inter", sans-serif;
        }

        body {
            width: var(--card-size);
            height: var(--card-size);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* ── 거대 배경 연도 ── */
        .bg-year {
            position: absolute;
            bottom: -50px;
            right: -30px;
            font-size: 320px;
            font-weight: 900;
            color: rgba(212, 255, 0, 0.03); /* 네온 옐로 극저농도 */
            z-index: 0;
            line-height: 1;
            letter-spacing: -10px;
        }

        /* ── 상단 헤더 ── */
        .header {
            position: relative;
            z-index: 10;
            padding: 70px var(--padding) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-tag {
            font-size: 30px;
            font-weight: 600;
            color: var(--neon-yellow);
            text-transform: uppercase;
        }
        .header-badge {
            font-size: 28px;
            font-weight: 800;
            background: var(--neon-yellow);
            color: #000;
            padding: 8px 18px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* ── 중앙 아이콘 ── */
        .central-icon-wrapper {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icon-mask {
            width: 240px;
            height: 240px;
            background-color: var(--neon-yellow);
            -webkit-mask: url("{{icon_base64}}") no-repeat center / contain;
            mask: url("{{icon_base64}}") no-repeat center / contain;
            opacity: 0.85;
        }

        /* ── 콘텐츠 영역 ── */
        .content {
            position: absolute;
            bottom: var(--padding);
            left: var(--padding);
            right: var(--padding);
            z-index: 10;
        }
        .hook-label {
            font-size: 24px;
            font-weight: 700;
            color: var(--neon-yellow);
            letter-spacing: 0.3em;
            margin-bottom: 20px;
        }
        .main-headline {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            word-break: keep-all;
        }
        .main-subtext {
            font-size: 32px;
            font-weight: 400;
            color: var(--text-sub);
            line-height: 1.5;
            max-width: 90%;
        }

        /* ── 영어 단어장 (미니멀) ── */
        .vocab-minimal {
            margin-top: 40px;
            border-left: 3px solid var(--neon-yellow);
            padding-left: 25px;
        }
        .vocab-item {
            font-size: 26px;
            margin-bottom: 8px;
            display: flex;
            gap: 15px;
        }
        .vocab-word { font-weight: 700; color: var(--neon-yellow); }
        .vocab-meaning { color: var(--text-sub); }

        /* ── 게시물 번호 라벨 ── */
        .post-number {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-family: 'Inter', monospace;
            font-size: 26px;
            color: rgba(212, 255, 0, 0.4);
            letter-spacing: 0.15em;
            font-weight: 500;
            z-index: 100;
        }

        /* ── 모드 제어 ── */
        .mode-ko { display: {{mode_ko_display}}; }
        .mode-en { display: {{mode_en_display}}; }
        .mode-quote { 
            display: {{mode_quote_display}}; 
            background-color: #F7F7F7;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; padding: var(--padding);
            display: flex; flex-direction: column; justify-content: center; color: #111;
        }
        /* 명언 디자인은 요청대로 유지 */
        .quote-text { font-size: 52px; font-weight: 700; font-style: italic; line-height: 1.4; margin-bottom: 30px; }
        .quote-author { font-size: 36px; font-weight: 800; text-align: right; }
    </style>
</head>
<body>
    <!-- 명언 모드가 아닐 때만 노출되는 레이어들 -->
    <div style="display: {{mode_quote_none_display}}">
        <div class="bg-year">{{year}}</div>

        <div class="header">
            <div class="mode-ko" style="display: {{mode_ko_display}};">
                <div class="header-tag">{{years_ago}}년 전 오늘</div>
            </div>
            <div class="mode-en" style="display: {{mode_en_display}};">
                <div class="header-tag">{{years_ago}} YEARS AGO TODAY</div>
            </div>
            
            <div class="mode-ko" style="display: {{mode_ko_display}};">
                <div class="header-badge">{{full_date_ko}}</div>
            </div>
            <div class="mode-en" style="display: {{mode_en_display}};">
                <div class="header-badge">{{full_date_en}}</div>
            </div>
        </div>

        <div class="central-icon-wrapper">
            <div class="icon-mask"></div>
        </div>

        <div class="content">
            <div class="hook-label">WAIT, WHAT?</div>
            
            <div class="mode-ko">
                <h1 class="main-headline">{{card_headline_ko}}</h1>
                <p class="main-subtext">{{card_subtext_ko}}</p>
            </div>

            <div class="mode-en">
                <h1 class="main-headline" style="font-size: 56px;">{{card_headline_en}}</h1>
                <p class="main-subtext" style="font-size: 28px;">{{card_subtext_en}}</p>
                <div class="vocab-minimal">
                    {{vocab_html}}
                </div>
            </div>
        </div>

        <!-- 게시물 번호 -->
        <div class="post-number">{{post_number}}</div>
    </div>

    <!-- [QUOTE] 명언 모드 (기존 유지) -->
    <div class="mode-quote" style="display: {{mode_quote_display}};">
        <div style="font-size: 120px; color: #D4A373; opacity: 0.3; margin-bottom: -40px;">“</div>
        <p class="quote-text">{{quote_en}}</p>
        <p class="quote-author">— {{quote_author}}</p>
        <p class="quote-translation" style="font-size: 32px; font-weight: 500; color: #555; padding-top: 30px; border-top: 2px dashed #DDD; margin-top: 30px;">{{quote_ko}}</p>
    </div>
</body>
</html>
