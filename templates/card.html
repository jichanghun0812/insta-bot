<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역사 x 영어 x 명언 통합 카드</title>
    <!-- Pretendard 웹폰트 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <style>
        :root {
            --card-size: 1080px;
            --padding: 80px;
            --text-main: #FFFFFF; /* 이미지 배경 위에서는 흰색이 기본 */
            --text-sub: rgba(255, 255, 255, 0.8);
            --accent: #D4A373;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Pretendard Variable", Pretendard, sans-serif;
        }

        body {
            width: var(--card-size);
            height: var(--card-size);
            background-color: #222;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ── 배경 이미지 및 오버레이 (KO, EN 모드용) ── */
        .bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            display: {{bg_image_display}};
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%); /* 로드 실패시 대비 */
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
            display: {{bg_image_display}};
        }

        /* ── 상단 공통 헤더 ── */
        .header {
            position: relative;
            z-index: 10;
            padding: 60px var(--padding) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-tag {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .header-year {
            font-size: 32px;
            font-weight: 700;
            background: var(--text-main);
            color: #111;
            padding: 10px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* ── 메인 콘텐츠 영역 ── */
        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            padding: 40px var(--padding) 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 하단 정렬로 통일 */
        }

        /* [KO / EN 공통 스타일] */
        .main-headline {
            font-size: 76px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 25px;
            word-break: keep-all;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .main-subtext {
            font-size: 40px;
            font-weight: 500;
            color: var(--text-sub);
            line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* [모드 1: 한국어 역사 카드] */
        .mode-ko { display: {{mode_ko_display}}; }

        /* [모드 2: 영어 학습 카드] */
        .mode-en { display: {{mode_en_display}}; }
        .vocab-box {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .vocab-title {
            font-size: 24px;
            font-weight: 800;
            color: #FFD369; /* 포인트 컬러 */
            margin-bottom: 15px;
        }
        .vocab-item {
            font-size: 30px;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
        }
        .vocab-word { font-weight: 700; color: white; }
        .vocab-meaning { font-weight: 400; color: rgba(255,255,255,0.7); }

        /* [모드 3: 명언 카드 - 독립적 디자인 유지] */
        .mode-quote { 
            display: {{mode_quote_display}}; 
            background-color: #F7F7F7; /* 명언 모드만 밝은 배경 */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            padding: var(--padding);
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #111;
        }
        .quote-mark { font-size: 120px; color: #D4A373; opacity: 0.3; margin-bottom: -40px; }
        .quote-text { font-size: 52px; font-weight: 700; font-style: italic; line-height: 1.4; margin-bottom: 30px; }
        .quote-author { font-size: 36px; font-weight: 800; text-align: right; margin-bottom: 60px; }
        .quote-translation { font-size: 32px; font-weight: 500; color: #555; padding-top: 30px; border-top: 2px dashed #DDD; }
        .quote-source { position: absolute; bottom: 60px; right: var(--padding); font-size: 24px; color: #AAA; }

    </style>
</head>
<body>
    <!-- 배경 이미지 (KO, EN용) -->
    <img class="bg-image" src="{{image_base64}}" alt="Background">
    <div class="overlay"></div>

    <!-- 공통 헤더 -->
    <div class="header" style="{{header_style}}">
        <div class="header-tag">{{header_tag}}</div>
        <div class="header-year">{{card_year}}</div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="content">
        
        <!-- [KO] 한국어 역사 모드 -->
        <div class="mode-ko">
            <h1 class="main-headline">{{card_headline_ko}}</h1>
            <p class="main-subtext">{{card_subtext_ko}}</p>
        </div>

        <!-- [EN] 영어 학습 모드 -->
        <div class="mode-en">
            <h1 class="main-headline" style="font-size: 64px;">{{card_headline_en}}</h1>
            <p class="main-subtext" style="font-size: 36px;">{{card_subtext_en}}</p>
            
            <div class="vocab-box">
                <div class="vocab-title">📘 Today's Vocab</div>
                <div class="vocab-list">
                    {{vocab_html}}
                </div>
            </div>
        </div>
    </div>

    <!-- [QUOTE] 명언 모드 (독립 레이아웃) -->
    <div class="mode-quote" style="display: {{mode_quote_display}};">
        <div class="quote-mark">“</div>
        <p class="quote-text">{{quote_en}}</p>
        <p class="quote-author">— {{quote_author}}</p>
        <p class="quote-translation">{{quote_ko}}</p>
        <div class="quote-source">📚 출처: Wikiquote</div>
    </div>

</body>
</html>
